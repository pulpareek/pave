# =============================================================================
# PAVE App resource (Databricks Apps) + bound dependencies
# =============================================================================
# Runtime config (uvicorn command + env) lives in ../src/app/app.yaml.
# The bound `database` resource auto-injects PGHOST/PGPORT/PGDATABASE/PGUSER/
# PGSSLMODE into the app — do NOT also map those via valueFrom in app.yaml.
# =============================================================================

resources:
  apps:
    pave:
      name: pave
      description: |
        PAVE — Platform Asset Vending Engine. Governed, form-driven self-service
        provisioning portal: intake -> risk-tiered approval -> SDK provisioning ->
        enterprise tagging -> FinOps cost attribution. Built on Databricks Apps.
      source_code_path: ../src/app

      resources:
        - name: sql-warehouse
          description: Warehouse for FinOps / system.billing.usage queries (OBO)
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

        - name: database
          description: Lakebase Postgres — PAVE operational state (requests, approvals, registry)
          database:
            instance_name: ${var.lakebase_instance_name}
            database_name: databricks_postgres
            permission: CAN_CONNECT_AND_CREATE

        - name: provisioning-job
          description: Serverless Job that provisions/decommissions resources on approval
          job:
            id: ${resources.jobs.pave_provisioning_job.id}
            permission: CAN_MANAGE_RUN
